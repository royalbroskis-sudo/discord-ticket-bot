<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            display: block;
            height: auto;
            min-height: 100vh;
            overflow: auto;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .landing {
            min-height: calc(100vh - 48px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .landing-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--accent-tint);
            border: 1px solid rgba(88,101,242,0.25);
            color: var(--accent-light);
            padding: 6px 16px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 28px;
            animation: fadeInUp 0.5s var(--transition-slow) both;
        }
        .landing-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: dotPulse 1.6s ease-in-out infinite; }

        .landing h1 {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 18px;
            background: linear-gradient(135deg, var(--text-bright) 30%, var(--accent-light) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: fadeInUp 0.5s 0.05s var(--transition-slow) both;
        }

        .landing p.sub {
            color: var(--text-muted);
            font-size: 16px;
            max-width: 480px;
            line-height: 1.6;
            margin-bottom: 40px;
            animation: fadeInUp 0.5s 0.1s var(--transition-slow) both;
        }

        .login-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--accent);
            color: #fff;
            padding: 15px 32px;
            text-decoration: none;
            border-radius: var(--r-md);
            font-size: 15.5px;
            font-weight: 700;
            font-family: inherit;
            position: relative;
            overflow: hidden;
            transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
            animation: fadeInUp 0.5s 0.15s var(--transition-slow) both;
        }
        .login-btn:hover {
            background: var(--accent-mid);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px var(--accent-glow);
        }
        .login-btn::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(115deg, transparent 20%, rgba(255,255,255,0.25) 40%, transparent 60%);
            transform: translateX(-120%);
            transition: transform 0.55s ease;
        }
        .login-btn:hover::after { transform: translateX(120%); }

        .feature-row {
            display: flex;
            gap: 16px;
            margin-top: 56px;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeInUp 0.5s 0.2s var(--transition-slow) both;
        }
        .feature-chip {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            padding: 14px 20px;
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: border-color var(--transition), transform var(--transition);
        }
        .feature-chip:hover {
            border-color: rgba(88,101,242,0.4);
            transform: translateY(-2px);
            color: var(--text-main);
        }
        .feature-chip .emoji { font-size: 16px; }
    </style>
</head>
<body>
    <div class="landing">
        <div class="landing-badge"><span class="dot"></span> Online &amp; ready</div>
        <h1>Manage your server<br>without the hassle</h1>
        <p class="sub">Autorole, welcome messages, moderation, tickets, applications and more — all in one dashboard. Sign in with Discord to get started.</p>
        <a href="/login" class="login-btn">
            <svg width="20" height="20" viewBox="0 0 127.14 96.36" fill="currentColor"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/></svg>
            Login with Discord
        </a>
        <div class="feature-row">
            <div class="feature-chip"><span class="emoji">🤖</span> Autorole &amp; Welcome</div>
            <div class="feature-chip"><span class="emoji">🛡️</span> AutoMod</div>
            <div class="feature-chip"><span class="emoji">🎫</span> Ticket Manager</div>
            <div class="feature-chip"><span class="emoji">📝</span> Applications</div>
            <div class="feature-chip"><span class="emoji">🏗️</span> Build Tracker</div>
        </div>
    </div>
</body>
</html>
